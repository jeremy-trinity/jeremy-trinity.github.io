<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UoPeople CS Hub | Jet</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #5865F2; /* Discord Blue */
            --accent-hover: #4752c4;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .join-button {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .join-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>UoPeople CS Hub</h1>
        <p>Welcome, colleague. Join our private community to collaborate on projects, discuss coursework, and network with fellow CS students.</p>
        
        <a href="https://discord.gg/SEAPuDmq" class="join-button">
            Enter Discord Server
        </a>

        <footer>
            Maintained by Jeremy Trinity (Trindade)
            also known as Jet
        </footer>
    </div>

</body>
</html>
